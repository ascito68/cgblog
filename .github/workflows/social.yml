name: Publish new articles to social

on:
  push:
    branches: [main]
    paths:
      - 'post/**'
  workflow_dispatch:
    inputs:
      files:
        description: 'File da pubblicare (es. post/sopralluogo-faeto-notturna.html)'
        required: true
        default: 'post/sopralluogo-faeto-notturna.html'

permissions:
  contents: read

jobs:
  social:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Detect newly added articles
        id: new
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            FILES="${{ github.event.inputs.files }}"
          else
            BEFORE="${{ github.event.before }}"
            if [ "$BEFORE" = "0000000000000000000000000000000000000000" ] || ! git cat-file -e "$BEFORE" 2>/dev/null; then
              BEFORE=$(git rev-parse "${{ github.sha }}~1")
            fi
            FILES=$(git diff --name-only --diff-filter=A "$BEFORE" "${{ github.sha }}" -- 'post/*.html' | tr '\n' ' ')
          fi
          echo "files=$FILES" >> "$GITHUB_OUTPUT"
          echo "Articoli da pubblicare: ${FILES:-nessuno}"

      - name: Post to Facebook and Instagram
        if: steps.new.outputs.files != ''
        env:
          META_PAGE_TOKEN: ${{ secrets.META_PAGE_TOKEN }}
          FB_PAGE_ID: ${{ secrets.FB_PAGE_ID }}
          IG_USER_ID: ${{ secrets.IG_USER_ID }}
        run: python3 scripts/social_post.py ${{ steps.new.outputs.files }}
